<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DeskFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F5;--s0:#FFFFFF;--s1:#F0EFEC;--s2:#E8E7E3;--s3:#DDDCD8;
  --b1:#E2E1DD;--b2:#CCCBC7;--b3:#AEADA9;
  --t1:#1A1916;--t2:#595753;--t3:#8E8C89;
  --ac:#2563EB;--acl:#EFF4FF;--ach:#1D4ED8;
  --re:#DC2626;--rel:#FEF2F2;--am:#D97706;--aml:#FFFBEB;
  --gr:#16A34A;--grl:#F0FDF4;--pu:#7C3AED;--pul:#F5F3FF;
  --fn:'Inter',sans-serif;--mo:'JetBrains Mono',monospace;
  --r:8px;--rl:12px;--rs:5px;
  --sh:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.1);
  --shm:0 4px 16px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.08)
}
body{font-family:var(--fn);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h2{font-size:18px;font-weight:600;letter-spacing:-.4px}
h3{font-size:14px;font-weight:600}
button,input,select,textarea{font-family:var(--fn);font-size:14px}
a{color:var(--ac);text-decoration:none}

/* ── SCREENS ── */
.scr{display:none;min-height:100vh}
.scr.on{display:flex}
#s-login{align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1b4b 0%,#2563EB 60%,#0891b2 100%)}
#s-app{flex-direction:column}

/* ── AUTH ── */
.auth-box{background:var(--s0);border-radius:var(--rl);width:420px;max-width:94vw;box-shadow:var(--shm);overflow:hidden}
.auth-logo{display:flex;align-items:center;gap:10px;padding:24px 26px 16px}
.auth-logo-ic{width:36px;height:36px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center}
.auth-logo-ic svg{width:18px;height:18px;fill:white}
.auth-logo-name{font-size:17px;font-weight:700;letter-spacing:-.4px;color:var(--t1)}
.auth-logo-sub{font-size:11px;color:var(--t3)}
.auth-inner{padding:0 26px 24px}
.auth-tabs{display:flex;gap:3px;background:var(--s1);border-radius:var(--r);padding:3px;margin-bottom:18px}
.atab{flex:1;padding:7px;border-radius:6px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--t2);transition:all .15s}
.atab.on{background:var(--s0);color:var(--t1);box-shadow:var(--sh)}

/* ── FORMS ── */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:1.5px solid var(--b1);border-radius:var(--r);color:var(--t1);background:var(--s1);outline:none;transition:all .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ac);background:var(--s0);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.fg textarea{resize:vertical;line-height:1.5;min-height:80px}
.fg .hint{font-size:11.5px;color:var(--t3);margin-top:4px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);border:1.5px solid var(--b2);background:var(--s0);color:var(--t1);font-size:13px;font-weight:500;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn:hover{background:var(--s1)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;pointer-events:none}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn.pr{background:var(--ac);color:white;border-color:var(--ac)}
.btn.pr:hover{background:var(--ach)}
.btn.dn{background:var(--re);color:white;border-color:var(--re)}
.btn.sc{background:var(--s1);border-color:var(--b1)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn.ic{padding:6px;border:none;background:none;color:var(--t3)}
.btn.ic:hover{color:var(--t1);background:var(--s1)}
.btn.bw{width:100%;justify-content:center}

/* ── ALERTS ── */
.al{border-radius:var(--r);padding:9px 12px;font-size:13px;margin-bottom:12px;border:1.5px solid}
.al.er{background:var(--rel);color:#991b1b;border-color:#fca5a5}
.al.ok{background:var(--grl);color:#15803d;border-color:#86efac}
.al.in{background:var(--acl);color:#1e40af;border-color:#93c5fd}
.al.wn{background:var(--aml);color:#92400e;border-color:#fcd34d}

/* ── TOPBAR ── */
.topbar{height:52px;background:var(--s0);border-bottom:1.5px solid var(--b1);display:flex;align-items:center;gap:8px;padding:0 16px;flex-shrink:0;z-index:50;box-shadow:var(--sh)}
.tb-brand{display:flex;align-items:center;gap:8px;border:none;background:none;cursor:pointer;padding:0;flex-shrink:0}
.tb-ic{width:28px;height:28px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-ic svg{width:15px;height:15px;fill:white}
.tb-nm{font-size:15px;font-weight:700;letter-spacing:-.4px;color:var(--t1)}
.tb-div{width:1.5px;height:24px;background:var(--b1);flex-shrink:0}
.tb-nav{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:none}
.tnav{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:var(--r);border:none;background:none;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .14s;position:relative}
.tnav:hover{background:var(--s1);color:var(--t1)}
.tnav.on{background:var(--acl);color:var(--ac)}
.tnav svg{width:14px;height:14px;flex-shrink:0}
.tnav .nbadge{background:var(--re);color:white;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:2px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.bell-btn{position:relative;width:34px;height:34px;border-radius:var(--r);border:1.5px solid var(--b1);background:var(--s0);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .14s}
.bell-btn:hover{background:var(--s1);color:var(--t1)}
.bell-btn svg{width:16px;height:16px}
.bdot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--re);border:1.5px solid var(--s0);display:none}
.bdot.on{display:block}
.upill{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 4px;border-radius:20px;background:var(--s1);border:1.5px solid var(--b1);cursor:pointer;transition:all .14s}
.upill:hover{background:var(--s2)}
.ava{width:26px;height:26px;border-radius:50%;background:var(--ac);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ava img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.uname{font-size:12.5px;font-weight:600;color:var(--t1)}
.urole{font-size:11px;color:var(--t3)}

/* ── NOTIFICATION PANEL ── */
.notif-panel{position:fixed;top:56px;right:14px;width:340px;background:var(--s0);border:1.5px solid var(--b1);border-radius:var(--rl);box-shadow:var(--shm);z-index:200;display:none;flex-direction:column;max-height:480px}
.notif-panel.on{display:flex}
.notif-hd{padding:12px 16px;border-bottom:1.5px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.notif-list{overflow-y:auto;flex:1}
.ni{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border-bottom:1.5px solid var(--b1);cursor:pointer;transition:background .12s}
.ni:hover{background:var(--s1)}
.ni.unread{background:var(--acl)}
.ni:last-child{border-bottom:none}
.ni-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni-body{flex:1;min-width:0}
.ni-msg{font-size:12.5px;color:var(--t1);line-height:1.4}
.ni-ts{font-size:11px;color:var(--t3);margin-top:2px}
.notif-empty{padding:28px 16px;text-align:center;font-size:13px;color:var(--t3)}

/* ── ROLE BADGES ── */
.rb{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.rb-admin{background:#ede9fe;color:#5b21b6}
.rb-manager{background:#e0f2fe;color:#0369a1}
.rb-agent{background:#dcfce7;color:#15803d}
.rb-user{background:var(--s1);color:var(--t2)}

/* ── PANELS ── */
.app-body{flex:1;overflow:hidden;display:flex}
.pnl{display:none;flex:1;overflow-y:auto;padding:20px 24px}
.pnl.on{display:block}
.ph{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.ph h2{flex:1}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--s0);border:1.5px solid var(--b1);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.sc.link{cursor:pointer;transition:border-color .14s}
.sc.link:hover{border-color:var(--ac)}
.scn{font-size:26px;font-weight:700;letter-spacing:-.7px;line-height:1}
.scl{font-size:11.5px;color:var(--t3);margin-top:3px}
.scv{font-size:10px;color:var(--ac);margin-top:5px;font-weight:500}
.sc.ca .scn{color:var(--ac)}.sc.cr .scn{color:var(--re)}.sc.cam .scn{color:var(--am)}.sc.cg .scn{color:var(--gr)}

/* ── CHARTS ── */
.crow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.crow.wide{grid-template-columns:1fr}
.cc{background:var(--s0);border:1.5px solid var(--b1);border-radius:var(--r);padding:15px;box-shadow:var(--sh)}
.cct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:12px}
.ccw{position:relative;height:180px}

/* ── CARDS ── */
.card{background:var(--s0);border:1.5px solid var(--b1);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.chd{padding:12px 16px;border-bottom:1.5px solid var(--b1);display:flex;align-items:center;gap:10px}
.chd h3{flex:1}
.chd.link{cursor:pointer;transition:background .12s}
.chd.link:hover{background:var(--s1)}
.cbd{padding:16px}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 11px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1.5px solid var(--b1);white-space:nowrap}
tbody td{padding:9px 11px;border-bottom:1.5px solid var(--b1);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.b-open{background:var(--acl);color:#1e40af}
.b-pending{background:var(--aml);color:#92400e}
.b-in_progress{background:var(--pul);color:#5b21b6}
.b-resolved{background:var(--grl);color:#15803d}
.b-closed{background:var(--s2);color:var(--t3)}
.b-archived{background:var(--s2);color:var(--t3)}
.b-critical{background:var(--rel);color:#991b1b}
.b-high{background:var(--aml);color:#92400e}
.b-medium{background:var(--acl);color:#1e40af}
.b-low{background:var(--grl);color:#15803d}
.b-dept{background:var(--pul);color:#5b21b6}

/* ── TICKET LIST ── */
.tll{display:flex;gap:14px}
.tll-left{flex:1;min-width:0}
.tll-right{width:400px;flex-shrink:0;position:sticky;top:0;max-height:calc(100vh - 100px)}
.tkf{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fpls{display:flex;gap:2px;background:var(--s1);border-radius:var(--r);padding:3px;flex-shrink:0}
.fp{padding:5px 10px;border-radius:5px;border:none;background:none;font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);transition:all .12s}
.fp.on{background:var(--s0);color:var(--t1);box-shadow:var(--sh)}
.fsel{padding:6px 8px;border:1.5px solid var(--b1);border-radius:var(--r);font-size:12px;background:var(--s0);color:var(--t1);cursor:pointer;outline:none}
.sbox{position:relative;flex:1;min-width:140px}
.sbox svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3)}
.sbox input{width:100%;padding:7px 9px 7px 28px;border:1.5px solid var(--b1);border-radius:var(--r);font-size:13px;background:var(--s0);outline:none;color:var(--t1)}
.sbox input:focus{border-color:var(--ac)}
.tkl{display:flex;flex-direction:column;gap:5px}
.tkr{background:var(--s0);border:1.5px solid var(--b1);border-radius:var(--r);padding:11px 13px;cursor:pointer;transition:all .12s;display:grid;grid-template-columns:8px 1fr auto;gap:10px;align-items:start;box-shadow:var(--sh)}
.tkr:hover{border-color:var(--b2);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.tkr.on{border-color:var(--ac);background:#FAFBFF}
.pd{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.pd-critical{background:var(--re)}.pd-high{background:var(--am)}.pd-medium{background:var(--ac)}.pd-low{background:var(--gr)}
.tks{font-size:13px;font-weight:500;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tkm{font-size:11px;color:var(--t3);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tkr2{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.tkt{font-size:11px;color:var(--t3)}

/* ── DETAIL PANEL ── */
.dp{background:var(--s0);border:1.5px solid var(--b1);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;max-height:calc(100vh - 100px);overflow:hidden}
.dp.hid{display:none!important}
.dph{padding:13px 15px;border-bottom:1.5px solid var(--b1);flex-shrink:0}
.dpid{font-size:11px;font-family:var(--mo);color:var(--t3);margin-bottom:3px}
.dptt{font-size:13.5px;font-weight:600;line-height:1.35;letter-spacing:-.3px}
.dpb{flex:1;overflow-y:auto;padding:13px 15px}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:8px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.mi label{font-size:11px;color:var(--t3);display:block;margin-bottom:2px}
.mi .vl{font-size:13px;font-weight:500}
.mi select{width:100%;padding:5px 7px;font-size:12px;border:1.5px solid var(--b1);border-radius:5px;background:var(--s1);outline:none;color:var(--t1);transition:border-color .14s}
.mi select:focus{border-color:var(--ac)}
.desc-box{background:var(--s1);border-radius:var(--r);padding:10px;font-size:13px;line-height:1.6;color:var(--t2);margin-bottom:13px}
.tline{display:flex;flex-direction:column;gap:10px}
.tli{display:flex;gap:8px;align-items:flex-start}
.tld{width:8px;height:8px;border-radius:50%;background:var(--b2);flex-shrink:0;margin-top:4px}
.tld.cc{background:var(--ac)}.tld.nn{background:var(--am)}
.tla{font-weight:500;font-size:12px}.tlt{font-size:11px;color:var(--t3)}
.tlx{font-size:13px;color:var(--t2);margin-top:2px;line-height:1.5}
.tlac{font-size:12px;color:var(--t3);font-style:italic;margin-top:2px}
.ra{border-top:1.5px solid var(--b1);padding:11px 15px;flex-shrink:0}
.ra textarea{width:100%;padding:8px 10px;border:1.5px solid var(--b1);border-radius:var(--r);font-size:13px;resize:none;min-height:64px;outline:none;background:var(--s1);line-height:1.5;color:var(--t1);transition:all .14s}
.ra textarea:focus{border-color:var(--ac);background:var(--s0)}
.rar{display:flex;gap:6px;margin-top:7px;align-items:center}
.rarr{margin-left:auto;display:flex;gap:5px}

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:16px}
.mbg.on{display:flex}
.modal{background:var(--s0);border-radius:var(--rl);width:100%;max-width:540px;box-shadow:0 24px 64px rgba(0,0,0,.25);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.mhd{padding:16px 20px;border-bottom:1.5px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtt{font-size:15px;font-weight:600}
.mbd{padding:18px 20px;overflow-y:auto;flex:1}
.mft{padding:12px 20px;border-top:1.5px solid var(--b1);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0}

/* ── ADMIN ── */
.adml{display:grid;grid-template-columns:180px 1fr;gap:14px}
.admsb{display:flex;flex-direction:column;gap:1px}
.an{padding:7px 10px;border-radius:var(--r);border:none;background:none;font-size:13px;cursor:pointer;color:var(--t2);text-align:left;display:flex;align-items:center;gap:7px;transition:all .12s;width:100%;font-weight:500}
.an:hover{background:var(--s1);color:var(--t1)}.an.on{background:var(--acl);color:var(--ac)}
.an svg{width:14px;height:14px;flex-shrink:0}
.anlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);padding:10px 10px 3px}
.tg{width:38px;height:21px;border-radius:11px;background:var(--b2);position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.tg.on{background:var(--ac)}
.tg::after{content:'';position:absolute;top:2.5px;left:2.5px;width:16px;height:16px;border-radius:50%;background:white;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg.on::after{transform:translateX(17px)}
.tgw{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.dvd{height:1.5px;background:var(--b1);margin:14px 0}
.pbar{height:3px;border-radius:2px;margin-top:5px;background:var(--b1);transition:all .3s;width:0}

/* ── UPLOAD ── */
.uz{border:2px dashed var(--b2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .15s;color:var(--t3)}
.uz:hover,.uz.dz{border-color:var(--ac);background:var(--acl);color:var(--ac)}

/* ── HELP ── */
.hst{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start}
.hnum{width:22px;height:22px;border-radius:50%;background:var(--ac);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.hb strong{font-size:13.5px;display:block;margin-bottom:2px}
.hb p{font-size:13px;color:var(--t2);line-height:1.65}
.hs{margin-bottom:24px}
.hs h3{font-size:14px;font-weight:600;margin-bottom:11px;padding-bottom:8px;border-bottom:1.5px solid var(--b1)}

/* ── MISC ── */
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty svg{width:34px;height:34px;margin:0 auto 10px;display:block;opacity:.18}
.empty-t{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:4px}
.ld{display:flex;align-items:center;justify-content:center;padding:40px;gap:9px;color:var(--t3)}
.sp{width:17px;height:17px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spi .7s linear infinite}
@keyframes spi{to{transform:rotate(360deg)}}
#toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--t1);color:white;padding:9px 14px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--shm);animation:tani .2s ease;max-width:300px;pointer-events:all}
.toast.ok{background:var(--gr)}.toast.er{background:var(--re)}
@keyframes tani{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
</style>

<script>
// ══════════════════════════════════════════════════
// UTILITIES  — defined first, used everywhere
// ══════════════════════════════════════════════════
const G = id => document.getElementById(id);
const V = id => G(id)?.value?.trim() || '';
function scr(id){ document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on')); G(id)?.classList.add('on'); }
function ini(n){ if(!n)return '?'; return n.split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function ago(ts){
  if(!ts) return '—';
  const d = ts?.toDate ? ts.toDate() : (ts instanceof Date ? ts : new Date(ts));
  if(isNaN(d)) return '—';
  const diff = Date.now() - d.getTime();
  if(diff<60000) return 'just now';
  if(diff<3600000) return Math.floor(diff/60000)+'m ago';
  if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
  if(diff<604800000) return Math.floor(diff/86400000)+'d ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}
function fmtDate(ts){
  if(!ts) return '—';
  const d = ts?.toDate ? ts.toDate() : (ts instanceof Date ? ts : new Date(ts));
  if(isNaN(d)) return '—';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function toast(msg, type=''){
  const c=G('toasts'), t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.innerHTML=msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';},2800);
  setTimeout(()=>t.remove(),3200);
}
function Err(id,msg){ const el=G(id); if(el) el.innerHTML=`<div class="al er">${msg}</div>`; }
function pwBar(pw,id){
  let s=0;
  if(pw.length>=8)s++; if(pw.length>=12)s++; if(/[A-Z]/.test(pw))s++; if(/[0-9]/.test(pw))s++; if(/[^a-zA-Z0-9]/.test(pw))s++;
  const b=G(id); if(!b)return;
  b.style.background=['#DC2626','#D97706','#D97706','#16A34A','#16A34A'][Math.min(s-1,4)]||'var(--b1)';
  b.style.width=['20%','35%','55%','80%','100%'][Math.min(s,4)]||'0';
}

// ══════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════
const FC = {
  apiKey:"AIzaSyCLkmtDtT9SiJocMJBDQCcTe5vDQBAI-iI",
  authDomain:"desk-b09ab.firebaseapp.com",
  projectId:"desk-b09ab",
  storageBucket:"desk-b09ab.firebasestorage.app",
  messagingSenderId:"993895526033",
  appId:"1:993895526033:web:66b984c1e2880849f2d930"
};
const ROLES=['admin','manager','agent','user'];
const RL={admin:'Admin',manager:'Manager',agent:'Agent',user:'User'};
const ST=['open','pending','in_progress','resolved','closed'];
const SL={open:'Open',pending:'Pending',in_progress:'In Progress',resolved:'Resolved',closed:'Closed'};
const PR=['critical','high','medium','low'];

// ══════════════════════════════════════════════════
// APP STATE — single source of truth
// ══════════════════════════════════════════════════
let db,auth,stor;
let CU=null,CP=null;           // current firebase user + profile
let cfg={};                    // Firestore settings/system
let tickets=[],users=[],depts=[]; // live data
let curPanel='dashboard',selId=null;
let tvw='all',tdpt='',tpri='';   // ticket filter state
let imgPending=null,charts={},modFn=null,admTab='users';

// Notification state
let notifs=[];
let notifOpen=false;
let prevMap={};          // {ticketId: {status,assignedTo,commentCount}}
let loadDone=false;      // true after ALL queries for current role have returned once

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════
window.onload = function(){
  try{
    firebase.initializeApp(FC);
    db = firebase.firestore();
    auth = firebase.auth();
    try{ stor = firebase.storage(); }catch(e){}
    auth.onAuthStateChanged(onAuth);
  }catch(e){ alert('Firebase failed: '+e.message); }
};

async function onAuth(u){
  if(u){
    CU=u;
    await loadProfile(u.uid);
    if(!CP){ await wait(1500); await loadProfile(u.uid); }
    if(!CP){ await auth.signOut(); return; }
    if(CP.active===false){ toast('Account deactivated — contact admin','er'); await auth.signOut(); return; }
    await loadCfg();
    applyBrand();
    loadNotifStore();
    scr('s-app');
    buildNav();
    startData();
    nav('dashboard');
  } else {
    CU=null; CP=null;
    scr('s-login');
  }
}
async function loadProfile(uid){
  const d = await db.collection('users').doc(uid).get();
  if(d.exists) CP = {id:uid, ...d.data()};
}
async function loadCfg(){
  try{ const d=await db.collection('settings').doc('system').get(); cfg=d.exists?d.data():{}; }
  catch(e){ cfg={}; }
}
function applyBrand(){
  const nm=cfg.orgName||'DeskFlow Pro';
  const el=G('tb-nm'); if(el)el.textContent=nm;
  const an=G('aname'); if(an)an.textContent=nm;
  document.title=nm;
  if(cfg.accentColor){
    document.documentElement.style.setProperty('--ac',cfg.accentColor);
    document.documentElement.style.setProperty('--ach',cfg.accentColor);
    document.documentElement.style.setProperty('--acl',cfg.accentColor+'22');
  }
}

// ══════════════════════════════════════════════════
// AUTH SCREENS
// ══════════════════════════════════════════════════
function showTab(i){
  G('tab-li').style.display=i===0?'block':'none';
  G('tab-rg').style.display=i===1?'block':'none';
  document.querySelectorAll('.atab').forEach((b,j)=>b.classList.toggle('on',i===j));
  G('aerr').innerHTML='';
}
async function doLogin(){
  const em=V('lem'),pw=V('lpw');
  if(!em||!pw){ Err('aerr','Enter email and password.'); return; }
  try{ await auth.signInWithEmailAndPassword(em,pw); }
  catch(e){ Err('aerr',friendlyErr(e.code)); }
}
async function doReg(){
  const fn=V('rfn'),em=V('rem'),pw=V('rpw');
  if(!fn||!em||!pw){ Err('aerr','Fill in all fields.'); return; }
  if(pw.length<8){ Err('aerr','Password must be at least 8 characters.'); return; }
  try{
    const c=await auth.createUserWithEmailAndPassword(em,pw);
    const first=(await db.collection('users').get()).size===0;
    await db.collection('users').doc(c.user.uid).set({
      displayName:(fn+' '+V('rln')).trim(), email:em,
      role:first?'admin':'user', departmentId:'', photoURL:'', active:true,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    if(first){
      await db.collection('settings').doc('system').set({
        orgName:'DeskFlow Pro',assignMode:'manager',emailNotify:false,
        uploadEnabled:false,uploadMaxMB:3,archiveEnabled:true,archiveDays:30,deleteDays:60
      },{merge:true});
    }
    toast(first?'Welcome Admin!':'Account created — an admin will activate you.','ok');
  }catch(e){ Err('aerr',friendlyErr(e.code)); }
}
async function doForgot(){
  const em=V('lem');
  if(!em){ Err('aerr','Enter your email first.'); return; }
  try{ await auth.sendPasswordResetEmail(em); G('aerr').innerHTML='<div class="al ok">Reset email sent!</div>'; }
  catch(e){ Err('aerr',friendlyErr(e.code)); }
}
async function doLogout(){
  await auth.signOut();
  tickets=[]; users=[]; depts=[]; cfg={}; notifs=[]; prevMap={}; loadDone=false; selId=null;
}
function friendlyErr(c){
  return({
    'auth/wrong-password':'Incorrect password.',
    'auth/user-not-found':'No account with that email.',
    'auth/invalid-credential':'Incorrect email or password.',
    'auth/email-already-in-use':'Email already registered.',
    'auth/too-many-requests':'Too many attempts — try later.',
    'auth/weak-password':'Password too weak (min 8 chars).',
    'auth/invalid-email':'Invalid email address.'
  }[c]||'Error: '+c);
}

// ══════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════
const NAV_ITEMS=[
  {id:'dashboard',  lbl:'Dashboard',     r:['admin','manager','agent','user'], p:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
  {id:'tickets',    lbl:'Tickets',        r:['admin','manager','agent','user'], p:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2'},
  {id:'assigned',   lbl:'Assigned to Me', r:['admin','manager','agent','user'], p:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', badge:true},
  {id:'myrequests', lbl:'My Requests',    r:['admin','manager','agent','user'], p:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7l3 3m0 0l3-3m-3 3V8'},
  {id:'newticket',  lbl:'New Ticket',     r:['admin','manager','agent','user'], p:'M12 4v16m8-8H4'},
  {id:'reports',    lbl:'Reports',        r:['admin','manager'],               p:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'},
  {id:'admin',      lbl:'Admin',          r:['admin'],                         p:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065zM15 12a3 3 0 11-6 0 3 3 0 016 0z'},
  {id:'profile',    lbl:'My Account',     r:['admin','manager','agent','user'], p:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z'},
  {id:'help',       lbl:'Help',           r:['admin','manager','agent','user'], p:'M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z'},
];
function buildNav(){
  if(!CP) return;
  const assignedCnt = tickets.filter(t=>t.assignedTo===CU.uid&&!['resolved','closed','archived'].includes(t.status)).length;
  G('tb-nav').innerHTML = NAV_ITEMS.filter(n=>n.r.includes(CP.role)).map(n=>{
    const badge = n.badge && assignedCnt>0 ? `<span class="nbadge">${assignedCnt}</span>` : '';
    return `<button class="tnav${curPanel===n.id?' on':''}" id="nav-${n.id}" onclick="nav('${n.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${n.p}"/></svg>
      ${n.lbl}${badge}
    </button>`;
  }).join('');
  const av=G('tb-av');
  if(CP.photoURL) av.innerHTML=`<img src="${CP.photoURL}">`;
  else av.textContent=ini(CP.displayName||CP.email);
  const unm=G('tb-uname'); if(unm)unm.textContent=CP.displayName||CP.email;
  const url=G('tb-urole'); if(url)url.textContent=RL[CP.role]||CP.role;
}
function nav(id){
  curPanel=id;
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
  G('p-'+id)?.classList.add('on');
  document.querySelectorAll('.tnav').forEach(b=>b.classList.remove('on'));
  G('nav-'+id)?.classList.add('on');
  renderPanel(id);
}
function renderPanel(id){
  const el=G('p-'+id);
  if(!el||!el.classList.contains('on')) return;
  const fns={dashboard:pDash,tickets:pTickets,assigned:pAssigned,myrequests:pMyReqs,
              newticket:pNewTicket,reports:pReports,admin:pAdmin,profile:pProfile,help:pHelp};
  (fns[id]||function(){})(el);
}

// ══════════════════════════════════════════════════
// DATA — FIRESTORE LISTENERS
// KEY RULE: NEVER .where() + .orderBy() = composite index required = silent empty
// Sort client-side after merging
// ══════════════════════════════════════════════════
function startData(){
  loadDone=false; prevMap={};
  const role=CP.role, uid=CU.uid;
  const sort=(a,b)=>(b.createdAt?.toDate?.()?.getTime()||0)-(a.createdAt?.toDate?.()?.getTime()||0);

  // Users + depts: all roles need these
  db.collection('users').onSnapshot(s=>{
    users=s.docs.map(d=>({id:d.id,...d.data()}));
    buildNav();
    if(curPanel==='admin')renderPanel('admin');
  });
  db.collection('departments').onSnapshot(s=>{
    depts=s.docs.map(d=>({id:d.id,...d.data()}));
    if(curPanel==='admin')renderPanel('admin');
    if(curPanel==='newticket')renderPanel('newticket');
  });

  if(role==='admin'||role==='agent'){
    // No where() → orderBy is safe
    db.collection('tickets').orderBy('createdAt','desc').onSnapshot(s=>{
      const t=s.docs.map(d=>({id:d.id,...d.data()}));
      checkChanges(t,true); tickets=t;
      onTicketsReady();
    });
    return;
  }

  // Manager + User: multiple where() queries, merge client-side, NO orderBy
  const pool={};
  let q1=false,q2=false,q3=false;

  function tryMerge(allDone){
    const merged=Object.values(pool).sort(sort);
    checkChanges(merged, allDone);
    tickets=merged;
    onTicketsReady();
  }

  // Q1: assigned to me (works for every role)
  db.collection('tickets').where('assignedTo','==',uid).onSnapshot(s=>{
    s.docs.forEach(d=>{pool[d.id]={id:d.id,...d.data()};});
    q1=true; tryMerge(q1&&q2&&q3);
  });

  // Q2: created by me
  db.collection('tickets').where('createdBy','==',uid).onSnapshot(s=>{
    s.docs.forEach(d=>{pool[d.id]={id:d.id,...d.data()};});
    q2=true; tryMerge(q1&&q2&&q3);
  });

  // Q3: manager gets dept tickets too
  if(role==='manager'&&CP.departmentId){
    db.collection('tickets').where('departmentId','==',CP.departmentId).onSnapshot(s=>{
      s.docs.forEach(d=>{pool[d.id]={id:d.id,...d.data()};});
      q3=true; tryMerge(q1&&q2&&q3);
    });
  } else {
    q3=true;
  }

  if(role==='manager') doArchive();
}

function onTicketsReady(){
  buildNav(); // refresh badge count
  if(['dashboard','tickets','assigned','myrequests','reports'].includes(curPanel))
    renderPanel(curPanel);
}

// ══════════════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════════════
function loadNotifStore(){
  if(!CU) return;
  try{ const s=localStorage.getItem('df_n_'+CU.uid); if(s) notifs=JSON.parse(s); }catch(e){ notifs=[]; }
  updateBell();
}
function saveNotifStore(){
  try{ localStorage.setItem('df_n_'+CU.uid, JSON.stringify(notifs.slice(0,60))); }catch(e){}
}
function updateBell(){
  const n=notifs.filter(x=>!x.read).length;
  const dot=G('bdot'); if(dot) dot.classList.toggle('on',n>0);
}
function addNotif(type,msg,ticketId,num){
  notifs.unshift({id:Date.now()+Math.random(),type,msg,ticketId,num,ts:Date.now(),read:false});
  if(notifs.length>60) notifs=notifs.slice(0,60);
  saveNotifStore(); updateBell();
  if(notifOpen) renderNotifList();
  toast(msg.replace(/<[^>]+>/g,''),'ok');
}
function checkChanges(newTickets, allDone){
  if(!CU) return;
  const uid=CU.uid;
  if(!loadDone){
    // First pass: just build the map silently
    newTickets.forEach(t=>{
      prevMap[t.id]={status:t.status,assignedTo:t.assignedTo||'',commentCount:(t.comments||[]).length};
    });
    if(allDone) loadDone=true;
    return;
  }
  newTickets.forEach(t=>{
    const prev=prevMap[t.id];
    const num=t.ticketNumber||('#'+t.id.slice(-6));
    const iMine=(t.assignedTo||'')=== uid;
    const iMade=t.createdBy===uid;
    if(!prev){
      // Brand new ticket arrived after initial load
      if(iMine) addNotif('assigned','<strong>'+num+'</strong> assigned to you: '+t.subject,t.id,num);
      else if(CP?.role==='manager'&&t.departmentId===CP.departmentId)
        addNotif('new','New ticket in your dept: <strong>'+t.subject+'</strong>',t.id,num);
      prevMap[t.id]={status:t.status,assignedTo:t.assignedTo||'',commentCount:(t.comments||[]).length};
      return;
    }
    const wasAssigned=prev.assignedTo||'', nowAssigned=t.assignedTo||'';
    if(wasAssigned!==nowAssigned&&nowAssigned===uid)
      addNotif('assigned','<strong>'+num+'</strong> was assigned to you',t.id,num);
    if(prev.status!==t.status&&(iMine||iMade))
      addNotif('updated','Status → <strong>'+(SL[t.status]||t.status)+'</strong> on <strong>'+num+'</strong>',t.id,num);
    const nc=(t.comments||[]).length;
    if(nc>prev.commentCount&&(iMine||iMade)){
      const last=(t.comments||[]).slice(-1)[0];
      if(last&&last.authorId!==uid)
        addNotif('comment','New reply on <strong>'+num+'</strong> from '+(last.authorName||'team'),t.id,num);
    }
    prevMap[t.id]={status:t.status,assignedTo:nowAssigned,commentCount:nc};
  });
}

function mkDonut(id,lbs,data,colors){
  kc(id); const c=G(id); if(!c)return;
  charts[id]=new Chart(c,{type:'doughnut',data:{labels:lbs,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},padding:10}}}}});
}
function mkTrend(id){
  kc(id); const c=G(id); if(!c)return;
  const lbs=[],cr=[],rs=[];
  for(let i=29;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    lbs.push(i%5===0?d.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'');
    const s=new Date(d); s.setHours(0,0,0,0); const e=new Date(d); e.setHours(23,59,59,999);
    cr.push(tickets.filter(t=>{const x=t.createdAt?.toDate?.();return x&&x>=s&&x<=e;}).length);
    rs.push(tickets.filter(t=>{const x=t.updatedAt?.toDate?.();return x&&x>=s&&x<=e&&['resolved','closed'].includes(t.status);}).length);
  }
  charts[id]=new Chart(c,{type:'line',
    data:{labels:lbs,datasets:[
      {label:'Created',data:cr,borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,.08)',tension:.4,fill:true,pointRadius:0,borderWidth:2},
      {label:'Resolved',data:rs,borderColor:'#16A34A',backgroundColor:'rgba(22,163,74,.06)',tension:.4,fill:true,pointRadius:0,borderWidth:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{font:{size:11},padding:12}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},stepSize:1}}}}});
}
function kc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

async function updTk(id,field,val,dpId){
  const t=tickets.find(x=>x.id===id); if(!t)return;
  const old=t[field];
  await db.collection('tickets').doc(id).update({[field]:val,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  if(old!==val){
    let nv=val;
    const lbl={status:'Status',priority:'Priority',departmentId:'Department',assignedTo:'Assignee'}[field]||field;
    if(field==='status')nv=SL[val]||val;
    else if(field==='departmentId')nv=depts.find(d=>d.id===val)?.name||'None';
    else if(field==='assignedTo')nv=users.find(u=>u.id===val)?.displayName||'Unassigned';
    await db.collection('tickets').doc(id).update({
      comments:firebase.firestore.FieldValue.arrayUnion({
        text:lbl+' changed to '+nv, type:'action',
        authorName:CP.displayName||CP.email, authorId:CU.uid,
        createdAt:firebase.firestore.Timestamp.now()
      })
    });
  }
  toast('Updated','ok');
}
async function addComment(id,type,dpId){
  const ta=G('rp-'+id); const text=ta?.value?.trim(); if(!text)return;
  await db.collection('tickets').doc(id).update({
    comments:firebase.firestore.FieldValue.arrayUnion({text,type,authorName:CP.displayName||CP.email,authorId:CU.uid,createdAt:firebase.firestore.Timestamp.now()}),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  ta.value=''; toast('Added','ok');
}

function onDeptPick(deptId){
  const h=G('nt-hint'); if(!h) return;
  if(!deptId){ h.style.display='none'; return; }

  const mode=cfg.assignMode||'manager';

  if(mode==='queue'&&d.queueManagerId){ const u=users.find(x=>x.id===d.queueManagerId); msg=`Will be routed to queue manager <strong>${u?.displayName||u?.email||'—'}</strong>.`; }
  else if(d.managerId){ const u=users.find(x=>x.id===d.managerId); msg=`Will be auto-assigned to <strong>${u?.displayName||u?.email||'—'}</strong> (${d.name} Manager).`; }
  else{ msg=`Will be placed in <strong>${d.name}</strong> queue — no manager configured yet.`; }
  h.innerHTML=msg; h.style.display='block';
}
function ntPickImg(f){
  if(!f) return;
  const mb=cfg.uploadMaxMB||3;
  if(!f.type.startsWith('image/')){ toast('Only image files accepted','er'); return; }
  if(f.size>mb*1024*1024){ toast(`File exceeds ${mb}MB`,'er'); return; }
  imgPending=f;
  const r=new FileReader();
  r.onload=e=>{
    const p=G('nt-prev'); if(!p)return;
    p.innerHTML=`<div style="position:relative;display:inline-block"><img src="${e.target.result}" style="width:76px;height:60px;object-fit:cover;border-radius:var(--r);border:1.5px solid var(--b1)"><button style="position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:var(--re);color:white;border:none;cursor:pointer;font-size:11px;line-height:1" onclick="imgPending=null;G('nt-prev').innerHTML='';G('nt-file').value=''">×</button></div>`;
  };
  r.readAsDataURL(f);
}
function ntDrop(e){ e.preventDefault(); document.querySelector('.uz')?.classList.remove('dz'); ntPickImg(e.dataTransfer.files[0]); }
async function submitTicket(){
  const subj=V('nt-subj'); if(!subj){ G('nt-err').innerHTML='<div class="al er">Subject is required.</div>'; return; }
  const deptId=G('nt-dept')?.value||''; if(!deptId){ G('nt-err').innerHTML='<div class="al er">Please select a department.</div>'; return; }
  const btn=G('nt-btn'); btn.disabled=true; btn.textContent='Submitting…';
  try{
    const dept=depts.find(d=>d.id===deptId);
    const mode=cfg.assignMode||'manager';
    let assignedTo=G('nt-assign')?.value||'', autoAssigned=false;
    if(!assignedTo&&dept){
      if(mode==='queue'&&dept.queueManagerId){ assignedTo=dept.queueManagerId; autoAssigned=true; }
      else if(dept.managerId){ assignedTo=dept.managerId; autoAssigned=true; }
    }
    const atts=[];
    if(imgPending&&stor&&cfg.uploadEnabled){
      const ref=stor.ref(`tickets/${Date.now()}_${imgPending.name}`);
      await ref.put(imgPending);
      const url=await ref.getDownloadURL();
      atts.push({name:imgPending.name,url,type:imgPending.type});
    }
    const cnt=(await db.collection('tickets').get()).size+1;
    const tk={
      ticketNumber:`TK-${String(cnt).padStart(4,'0')}`,
      subject:subj, description:V('nt-desc'),
      requesterName:V('nt-name')||CP.displayName||'',
      requesterEmail:CP.email||'',
      createdBy:CU.uid, departmentId:deptId, assignedTo, autoAssigned,
      priority:G('nt-prio')?.value||'medium',
      status:'open', attachments:atts, comments:[],
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };
    const ref=await db.collection('tickets').add(tk);
    if(assignedTo&&cfg.emailNotify===true){
      const assignee=users.find(u=>u.id===assignedTo);
      const toEmail=dept?.managerEmail||assignee?.email;
      if(toEmail) sendEmail(toEmail,tk.ticketNumber,subj,tk.priority,dept?.name||'');
    }
    toast(`Ticket ${tk.ticketNumber} submitted!`,'ok');
    imgPending=null;
    nav('myrequests');
  }catch(e){
    G('nt-err').innerHTML=`<div class="al er">${e.message}</div>`;
    btn.disabled=false; btn.textContent='Submit Ticket';
  }
}
function sendEmail(to,num,subj,prio,dept){
  if(!cfg.emailNotify){ return; }
  const sid=cfg.emailjsServiceId,tid=cfg.emailjsTemplateId,key=cfg.emailjsPublicKey;
  if(!sid||!tid||!key){ toast('Email not configured — see Admin → Email Notify','er'); return; }
  const go=()=>{
    try{
      emailjs.init(key);
      emailjs.send(sid,tid,{to_email:to,ticket_number:num,subject:subj,priority:prio,department:dept,org_name:cfg.orgName||'DeskFlow',app_url:window.location.origin})
        .then(()=>toast('Notification sent to '+to,'ok'))
        .catch(e=>toast('Email failed: '+(e.text||e.message),'er'));
    }catch(e){ toast('EmailJS error: '+e.message,'er'); }
  };
  if(typeof emailjs!=='undefined') go();
  else{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
    s.onload=go; s.onerror=()=>toast('Could not load EmailJS','er');
    document.head.appendChild(s);
  }
}

async function changePw(){
  const cur=V('pw-cur'),nw=V('pw-new'),con=V('pw-con');
  const msg=G('pw-msg');
  if(!cur||!nw||!con){ msg.innerHTML='<div class="al er">Fill in all fields.</div>'; return; }
  if(nw.length<8){ msg.innerHTML='<div class="al er">New password must be 8+ characters.</div>'; return; }
  if(nw!==con){ msg.innerHTML='<div class="al er">Passwords do not match.</div>'; return; }
  try{
    const c=firebase.auth.EmailAuthProvider.credential(CU.email,cur);
    await CU.reauthenticateWithCredential(c); await CU.updatePassword(nw);
    msg.innerHTML='<div class="al ok">Password changed!</div>';
    ['pw-cur','pw-new','pw-con'].forEach(id=>{const el=G(id);if(el)el.value='';});
  }catch(e){ msg.innerHTML=`<div class="al er">${e.code==='auth/wrong-password'?'Current password incorrect.':e.message}</div>`; }
}

// ARCHIVE JOB
// ══════════════════════════════════════════════════
async function doArchive(){
  const k='df_arch'; if(Date.now()-(+localStorage.getItem(k)||0)<3600000)return;
  localStorage.setItem(k,Date.now());
  if(cfg.archiveEnabled===false)return;
  const ad=cfg.archiveDays||30, dd=cfg.deleteDays||60;
  const ca=new Date(); ca.setDate(ca.getDate()-ad);
  const cd=new Date(); cd.setDate(cd.getDate()-dd);
  try{
    const s=await db.collection('tickets').get();
    for(const doc of s.docs){
      const t=doc.data(), u=t.updatedAt?.toDate?.()??new Date(0);
      if(t.status==='archived'&&u<cd) await doc.ref.delete();
      else if(['resolved','closed'].includes(t.status)&&u<ca)
        await doc.ref.update({status:'archived',archivedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
  }catch(e){console.warn('Archive:',e);}
}
